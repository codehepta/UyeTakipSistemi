<div>
  <div>
    <div class="chart">
      <canvas baseChart
              [data]="pieChartData"
              [type]="pieChartType"
              [options]="pieChartOptions"
              [plugins]="pieChartPlugins"
              [legend]="pieChartLegend"
              (chartClick)="chartClicked($event)"
              (chartHover)="chartHovered($event)">
      </canvas>
    </div>
  </div>
</div>
